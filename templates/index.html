<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Attendance Scanner</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- html5-qrcode -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#4338ca',
                        dark: '#0f172a',
                        darker: '#020617',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            font-family: 'Outfit', sans-serif;
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent 40%),
                              radial-gradient(circle at bottom left, #312e81, transparent 40%);
            min-height: 100vh;
        }
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 1.5rem;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #reader button {
            background-color: #4f46e5;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            margin-top: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        #reader button:hover {
            background-color: #4338ca;
        }
        .toast-enter {
            animation: slideIn 0.3s ease-out forwards;
        }
        .toast-leave {
            animation: slideOut 0.3s ease-in forwards;
        }
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100%); opacity: 0; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 selection:bg-primary selection:text-white">

    <div class="absolute top-6 left-6 text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-primary">
        AP Attendance
    </div>

    <!-- Quick Scan Toggle -->
    <div class="absolute bottom-6 right-6 flex items-center gap-3 bg-white/5 px-4 py-2 rounded-full backdrop-blur-md border border-white/10">
        <span class="text-xs font-bold uppercase tracking-wider text-gray-400">Quick Mode</span>
        <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="quick-mode-toggle" class="sr-only peer">
            <div class="w-11 h-6 bg-gray-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
        </label>
    </div>

    <a href="/admin" class="absolute top-6 right-6 text-sm font-medium text-blue-200 hover:text-white transition-colors flex items-center gap-2 bg-white/5 px-4 py-2 rounded-full backdrop-blur-sm border border-white/10 hover:bg-white/10">
        Admin Panel Form <span aria-hidden="true">&rarr;</span>
    </a>

    <div class="w-full max-w-2xl text-center flex flex-col items-center">
        <h1 class="text-4xl md:text-5xl font-bold mb-4">Mark Attendance</h1>
        <p class="text-gray-400 mb-8 md:text-lg">Please hold your ID card QR code in front of the camera.</p>

        <!-- Scanner Container -->
        <div id="reader" class="mb-6"></div>

        <!-- Fallback / Physical Scanner Input -->
        <div class="mb-8 w-full max-w-sm">
            <p class="text-xs text-gray-500 mb-2 uppercase tracking-wide">Or use USB Scanner / Manual Entry</p>
            <form id="manual-scan-form" class="flex gap-2">
                <input type="text" id="manual-scanner-input" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-white outline-none focus:border-primary focus:ring-1 focus:ring-primary transition" placeholder="Scan or type token here..." autocomplete="off" autofocus>
                <button type="submit" class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-xl transition font-medium">Submit</button>
            </form>
        </div>

        <!-- Feedback UI -->
        <div id="feedback" class="hidden w-full max-w-md p-6 rounded-2xl backdrop-blur-md border shadow-2xl transition-all duration-300 transform scale-95 opacity-0">
            <div class="flex items-center justify-center gap-4">
                <div id="feedback-icon" class="w-12 h-12 rounded-full flex items-center justify-center text-2xl"></div>
                <div class="text-left">
                    <h3 id="feedback-name" class="text-xl font-bold text-white"></h3>
                    <p id="feedback-message" class="text-sm font-medium"></p>
                </div>
                <div class="ml-auto text-right">
                    <p class="text-xs text-gray-400">Time Recorded</p>
                    <p id="feedback-time" class="text-lg font-bold text-white"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Background Beeps -->
    <audio id="beep-success" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    <audio id="beep-error" src="https://assets.mixkit.co/active_storage/sfx/2955/2955-preview.mp3" preload="auto"></audio>

    <script>
        const feedbackEl = document.getElementById('feedback');
        const beepSuccess = document.getElementById('beep-success');
        const beepError = document.getElementById('beep-error');
        const quickModeToggle = document.getElementById('quick-mode-toggle');
        
        let isScanningAllowed = true;

        function showFeedback(type, name, message, time) {
            feedbackEl.classList.remove('hidden');
            
            // Re-trigger reflow for animation
            void feedbackEl.offsetWidth;
            
            feedbackEl.classList.remove('scale-95', 'opacity-0');
            feedbackEl.classList.add('scale-100', 'opacity-100');

            if (type === 'IN') {
                feedbackEl.className = "w-full max-w-md p-6 rounded-2xl backdrop-blur-md border border-green-500/30 bg-green-500/10 shadow-[0_0_30px_rgba(34,197,94,0.2)] transition-all duration-300 transform scale-100 opacity-100";
                document.getElementById('feedback-icon').className = "w-12 h-12 rounded-full flex items-center justify-center text-2xl bg-green-500/20 text-green-400";
                document.getElementById('feedback-icon').innerHTML = "👋";
                document.getElementById('feedback-message').className = "text-sm font-medium text-green-400";
            } else if (type === 'OUT') {
                feedbackEl.className = "w-full max-w-md p-6 rounded-2xl backdrop-blur-md border border-blue-500/30 bg-blue-500/10 shadow-[0_0_30px_rgba(59,130,246,0.2)] transition-all duration-300 transform scale-100 opacity-100";
                document.getElementById('feedback-icon').className = "w-12 h-12 rounded-full flex items-center justify-center text-2xl bg-blue-500/20 text-blue-400";
                document.getElementById('feedback-icon').innerHTML = "🏃";
                document.getElementById('feedback-message').className = "text-sm font-medium text-blue-400";
            } else {
                feedbackEl.className = "w-full max-w-md p-6 rounded-2xl backdrop-blur-md border border-red-500/30 bg-red-500/10 shadow-[0_0_30_px_rgba(239,68,68,0.2)] transition-all duration-300 transform scale-100 opacity-100";
                document.getElementById('feedback-icon').className = "w-12 h-12 rounded-full flex items-center justify-center text-2xl bg-red-500/20 text-red-400";
                document.getElementById('feedback-icon').innerHTML = "⚠️";
                document.getElementById('feedback-message').className = "text-sm font-medium text-red-400";
            }

            document.getElementById('feedback-name').innerText = name;
            document.getElementById('feedback-message').innerText = message;
            document.getElementById('feedback-time').innerText = time || "--:--:--";

            setTimeout(() => {
                feedbackEl.classList.remove('scale-100', 'opacity-100');
                feedbackEl.classList.add('scale-95', 'opacity-0');
            }, quickModeToggle.checked ? 1500 : 3000);
        }

        async function onScanSuccess(decodedText) {
            if (!isScanningAllowed) return;
            isScanningAllowed = false; // Debounce

            const isQuickMode = quickModeToggle.checked;

            try {
                const response = await fetch('/api/scan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ qr_token: decodedText })
                });

                const data = await response.json();

                if (response.ok) {
                    beepSuccess.currentTime = 0;
                    beepSuccess.play().catch(e=>console.log(e));
                    
                    if (!isQuickMode) {
                        Swal.fire({
                            title: data.status === 'IN' ? '✅ Marked In-Time' : '👋 Marked Out-Time',
                            html: `<p style="font-size: 1.25rem; font-weight: bold;">${data.user}</p><p>${data.message}</p><p style="margin-top:0.5rem; color:#9ca3af; font-size:0.875rem;">Time: ${data.time}</p>`,
                            icon: data.status === 'IN' ? 'success' : 'info',
                            timer: 3000,
                            showConfirmButton: false,
                            background: '#1e293b',
                            color: '#fff',
                            iconColor: data.status === 'IN' ? '#10b981' : '#3b82f6',
                            customClass: { popup: 'rounded-xl border border-white/10' }
                        });
                    }

                    showFeedback(data.status, data.user, data.message, data.time);
                } else {
                    beepError.currentTime = 0;
                    beepError.play().catch(e=>console.log(e));
                    
                    if (!isQuickMode) {
                        Swal.fire({
                            title: 'Error',
                            text: data.error,
                            icon: 'error',
                            timer: 3000,
                            showConfirmButton: false,
                            background: '#1e293b',
                            color: '#fff'
                        });
                    }
                    
                    showFeedback('ERROR', 'Error', data.error, '');
                }
            } catch (error) {
                console.error("Scan API Error:", error);
                beepError.currentTime = 0;
                beepError.play();
                showFeedback('ERROR', 'Network Error', 'Could not reach server', '');
            }

            // Allow next scan faster in quick mode
            setTimeout(() => {
                isScanningAllowed = true;
            }, isQuickMode ? 1000 : 3500);
        }

        function onScanFailure(error) {
            // handle scan failure, usually better to ignore and keep scanning
        }

        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { fps: 15, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 },
            /* verbose= */ false);
        
        try {
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        } catch(e) {
            console.error("Scanner failed to init", e);
        }

        // Global manual input handler
        document.getElementById('manual-scan-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const inputEl = document.getElementById('manual-scanner-input');
            const token = inputEl.value.trim();
            if(token) {
                onScanSuccess(token);
                inputEl.value = '';
                // Keep focus for subsequent scans
                setTimeout(() => inputEl.focus(), 10);
            }
        });

        // Global scan buffer for USB scanners that emulate keyboards
        let scanBuffer = '';
        let lastKeyTime = Date.now();
        document.addEventListener('keydown', function(e) {
            // Ignore if user is already typing in the input explicitly
            if (document.activeElement.tagName === 'INPUT') return;

            const currentTime = Date.now();
            if (currentTime - lastKeyTime > 50) {
                scanBuffer = '';
            }
            lastKeyTime = currentTime;

            if (e.key === 'Enter') {
                if (scanBuffer.length > 5) {
                    onScanSuccess(scanBuffer);
                    scanBuffer = '';
                    e.preventDefault();
                }
            } else if (e.key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
                scanBuffer += e.key;
            }
        });
    </script>

</body>
</html>
