<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - AP Attendance</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Outfit', 'sans-serif'] },
                    colors: {
                        primary: '#4f46e5',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at top left, #1e1b4b, transparent 40%),
                              radial-gradient(circle at bottom right, #312e81, transparent 40%);
            min-height: 100vh;
            color: white;
            display: flex;
            align-items: center;
            justify-center;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="absolute top-6 left-6 text-2xl font-bold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-primary">
        AP Attendance
    </div>

    <div class="w-full max-w-md p-8 rounded-3xl backdrop-blur-md border border-white/10 bg-white/5 shadow-2xl relative overflow-hidden">
        <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r from-primary to-blue-400"></div>
        <h2 class="text-3xl font-bold mb-2">Admin Portal</h2>
        <p class="text-gray-400 mb-8 text-sm">Please log in to manage students and attendance.</p>
        
        <form id="login-form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
                <input type="text" id="username" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition" placeholder="Enter 'admin'">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                <input type="password" id="password" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-500 outline-none focus:border-primary focus:ring-1 focus:ring-primary transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-primary text-white font-medium py-3 rounded-xl hover:bg-primary/90 transition shadow-lg shadow-primary/30 mt-4">
                Sign In
            </button>
        </form>
        <p id="error-msg" class="text-red-400 text-sm mt-4 text-center hidden"></p>
        
        <a href="/" class="block text-center mt-6 text-sm text-gray-500 hover:text-white transition">
            &larr; Back to Scanner
        </a>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('error-msg');
            
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                if(res.ok) {
                    window.location.href = '/admin';
                } else {
                    const data = await res.json();
                    errorEl.innerText = data.error || 'Invalid credentials';
                    errorEl.classList.remove('hidden');
                }
            } catch(error) {
                errorEl.innerText = 'Network Error';
                errorEl.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
